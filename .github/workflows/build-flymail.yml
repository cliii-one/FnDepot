name: 构建 FlyMail

on:
  push:
    tags: ['flymail-v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则读取 manifest 默认版本）'
        required: false
        default: ''
      create_release:
        description: '创建 GitHub Release'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      update_fnpack:
        description: '更新 fnpack.json 版本信息'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    name: 构建 ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            fnpack_platform: x86
            runner: ubuntu-latest
          - arch: arm64
            fnpack_platform: arm
            runner: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: flymail

    steps:
      # ========== 检出 FnDepot 仓库 ==========
      - name: 检出代码
        uses: actions/checkout@v4

      # ========== 确定版本号 ==========
      - name: 确定版本号
        id: version
        run: |
          MANIFEST_VER=$(grep '^version' manifest | awk -F'=' '{print $2}' | tr -d ' ')
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/flymail-v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#flymail-v}"
          else
            VERSION="${MANIFEST_VER}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"

      # ========== 克隆私有仓库源码 ==========
      - name: 克隆源码仓库
        env:
          PRIVATE_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git clone --depth=1 -b main https://x-access-token:${PRIVATE_TOKEN}@github.com/DinDing1/FlyMail.git /tmp/flymail-src
          echo "✅ 源码克隆完成"

      # ========== 构建前端 ==========
      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 构建前端
        run: |
          cd /tmp/flymail-src/frontend
          npm install
          npm run build
          echo "✅ 前端构建完成"

      # ========== 编译后端 (Nuitka) ==========
      - name: 编译 Python 后端 (Nuitka)
        run: |
          mkdir -p /tmp/nuitka-out
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "ARM 构建：在 ubuntu-24.04-arm 原生 runner 上编译..."
            PLATFORM="linux/arm64"
          else
            echo "x86_64 构建：在 ubuntu-latest 上编译..."
            PLATFORM="linux/amd64"
          fi
          
          docker run --rm --platform $PLATFORM \
            -v /tmp/flymail-src/backend:/build \
            -v /tmp/nuitka-out:/output \
            python:3.11-slim-bookworm \
            bash -c "
              apt-get update -qq && apt-get install -y -qq patchelf gcc > /dev/null &&
              pip install 'nuitka[onefile]' ordered-set websockets --quiet &&
              pip install -r /build/requirements.txt --quiet &&
              cd /build &&
              python -m nuitka --standalone --onefile \
                --lto=no \
                --include-package=db \
                --include-package=models \
                --include-package=providers \
                --include-package=services \
                --include-package=PIL \
                --include-module=PIL.Image \
                --include-module=PIL.ImageDraw \
                --include-module=PIL.ImageFont \
                --include-module=PIL.ImageFilter \
                --include-module=aiosqlite \
                --include-module=aioimaplib \
                --include-module=uvicorn \
                --include-module=uvicorn.lifespan.on \
                --include-module=uvicorn.lifespan.off \
                --include-module=uvicorn.protocols.websockets.auto \
                --include-module=uvicorn.protocols.websockets.wsproto_impl \
                --include-module=uvicorn.protocols.websockets.websockets_impl \
                --include-module=uvicorn.protocols.http.auto \
                --include-module=uvicorn.protocols.http.h11_impl \
                --include-module=uvicorn.protocols.http.httptools_impl \
                --include-module=uvicorn.logging \
                --include-module=uvicorn.loops \
                --include-module=uvicorn.loops.auto \
                --include-module=uvicorn.loops.asyncio \
                --include-module=email.mime.text \
                --include-module=email.mime.multipart \
                --include-module=httpx \
                --include-module=fastapi \
                --include-module=starlette \
                --include-module=starlette.middleware \
                --include-module=starlette.routing \
                --include-module=starlette.requests \
                --include-module=starlette.responses \
                --include-module=starlette.websockets \
                --include-module=websockets \
                --include-module=websockets.legacy \
                --include-module=websockets.legacy.server \
                --include-module=websockets.legacy.protocol \
                --include-module=websockets.server \
                --include-module=websockets.connection \
                --include-module=websockets.http \
                --include-module=websockets.http11 \
                --include-module=websockets.uri \
                --include-module=websockets.typing \
                --include-module=websockets.exceptions \
                --include-module=websockets.utils \
                --include-module=apscheduler \
                --include-module=apscheduler.schedulers \
                --include-module=apscheduler.schedulers.base \
                --include-module=apscheduler.schedulers.asyncio \
                --include-module=apscheduler.jobstores \
                --include-module=apscheduler.jobstores.base \
                --include-module=apscheduler.jobstores.sqlalchemy \
                --include-module=apscheduler.triggers \
                --include-module=apscheduler.triggers.date \
                --include-module=apscheduler.executors \
                --include-module=apscheduler.executors.base \
                --include-module=apscheduler.executors.pool \
                --include-module=sqlalchemy \
                --include-module=sqlalchemy.engine \
                --include-module=sqlalchemy.pool \
                --include-module=sqlalchemy.orm \
                --include-module=sqlalchemy.sql \
                --include-module=sqlalchemy.event \
                --include-module=multipart \
                --output-filename=flymail-server \
                --output-dir=/output \
                main.py &&
              echo '编译完成'
            "
          echo "✅ Python 后端编译完成"
          file /tmp/nuitka-out/flymail-server 2>/dev/null || true
          ls -lh /tmp/nuitka-out/flymail-server

      # ========== 组装应用文件 ==========
      - name: 组装应用文件
        run: |
          # 清理旧的前端文件
          rm -rf app/ui/assets app/ui/guide app/ui/*.html app/ui/*.js app/ui/*.css app/ui/*.svg app/ui/*.png
          # 复制新的前端产物
          mkdir -p app/ui
          cp -r /tmp/flymail-src/dist/ui/* app/ui/

          # 清理旧的后端文件
          rm -rf app/server/db app/server/models app/server/providers app/server/services
          rm -f app/server/main.py app/server/dev.py app/server/version.py app/server/requirements.txt
          rm -rf app/server/wheels app/server/__pycache__ app/server/ui
          # 复制新的后端二进制
          mkdir -p app/server
          cp /tmp/nuitka-out/flymail-server app/server/flymail-server
          chmod +x app/server/flymail-server
          # 通知图片模式：字体+LOGO 仅旁路一份 notify-assets（不 Nuitka 内嵌，避免 FPK 双份 ~16MB）
          rm -rf app/server/notify-assets
          mkdir -p app/server/notify-assets
          FONT_SRC="/tmp/flymail-src/backend/services/notify/assets/SourceHanSansSC-Regular.otf"
          ICON_SRC="/tmp/flymail-src/backend/services/notify/assets/icon.png"
          test -f "$FONT_SRC" || { echo "ERROR: missing notify font: $FONT_SRC"; exit 1; }
          test -f "$ICON_SRC" || { echo "ERROR: missing notify icon: $ICON_SRC"; exit 1; }
          cp -f "$FONT_SRC" app/server/notify-assets/SourceHanSansSC-Regular.otf
          cp -f "$ICON_SRC" app/server/notify-assets/icon.png
          ls -la app/server/notify-assets/
          test -s app/server/notify-assets/SourceHanSansSC-Regular.otf || { echo "ERROR: font copy empty"; exit 1; }
          echo "✅ 应用文件组装完成"

      # ========== 更新 manifest ==========
      - name: 更新 manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLATFORM="${{ matrix.fnpack_platform }}"
          sed -i "s/^version.*/version=${VERSION}/" manifest
          sed -i "s/^platform.*/platform=${PLATFORM}/" manifest

      # ========== 修复脚本权限 ==========
      - name: 修复脚本权限
        run: |
          for f in cmd/main cmd/install_init cmd/install_callback cmd/uninstall_init cmd/uninstall_callback cmd/upgrade_init cmd/upgrade_callback cmd/config_init cmd/config_callback; do
            [ -f "$f" ] && sed -i 's/\r$//' "$f" && chmod +x "$f"
          done

      # ========== 使用 fnpack 打包 FPK ==========
      - name: 下载 fnpack 并打包
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            curl -fsSL -o /tmp/fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-arm64
          else
            curl -fsSL -o /tmp/fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64
          fi
          chmod +x /tmp/fnpack
          /tmp/fnpack build --directory .
          FPKN=$(ls *.fpk) && mv "$FPKN" flymail-${{ matrix.arch == 'x86_64' && 'X86' || 'ARM' }}.fpk
          echo "✅ 构建完成: $(ls -lh *.fpk)"

      # ========== 上传产物 ==========
      - name: 上传 FPK
        uses: actions/upload-artifact@v4
        with:
          name: flymail-${{ matrix.arch }}
          path: flymail/flymail-*.fpk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/flymail-v') || github.event.inputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有 FPK
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: 删除旧版本 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null || echo "")
          echo "$RELEASES" | while read -r tag; do
            case "$tag" in flymail-*) gh release delete "${tag}" --yes --cleanup-tag 2>/dev/null || true;; esac
          done

      - name: 确定构建信息
        id: info
        run: |
          MANIFEST_VER=$(grep '^version' flymail/manifest | awk -F'=' '{print $2}' | tr -d ' ')
          if [[ "${{ github.ref }}" == refs/tags/flymail-v* ]]; then
            TAG="${{ github.ref_name }}" && VERSION="${TAG#flymail-v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="flymail-v${{ github.event.inputs.version }}" && VERSION="${{ github.event.inputs.version }}"
          else
            TAG="flymail-v${MANIFEST_VER}" && VERSION="${MANIFEST_VER}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_time=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M CST')" >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: "飞邮 FlyMail ${{ steps.info.outputs.version }}"
          files: ./artifacts/**/*.fpk
          generate_release_notes: false
          body: |
            ## 飞邮 FlyMail v${{ steps.info.outputs.version }}

            专为多邮箱用户打造的自托管邮件客户端，统一管理 Gmail、Outlook、QQ邮箱、网易邮箱、iCloud 等主流邮箱平台。

            ### 📦 下载

            | 文件 | 架构 | 适用设备 |
            |------|------|----------|
            | `flymail-X86.fpk` | x86_64 | Intel/AMD NAS |
            | `flymail-ARM.fpk` | arm64 | ARM NAS |

            ### ✨ 功能特性

            - 📬 多账号管理、聚合收件箱
            - ✉️ 邮件收发、富文本编辑
            - 📎 附件上传下载、定时发送
            - 📝 邮件草稿、个性签名
            - 🔄 实时同步、全平台支持

            ---
            构建时间：${{ steps.info.outputs.build_time }}

      - name: 更新 README 编译时间
        run: |
          git fetch origin main
          git checkout -B main origin/main
          python3 scripts/update-readme-time.py flymail "${{ steps.info.outputs.build_time }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "无变更" && exit 0
          git add README.md
          git commit -m "docs: 更新 flymail 编译时间"
          git push origin main

      - name: 更新 fnpack.json 版本信息
        if: github.event.inputs.update_fnpack == 'true'
        run: |
          git fetch origin main
          git checkout -B main origin/main
          python3 scripts/update-fnpack.py flymail "${{ steps.info.outputs.tag }}" "${{ github.repository }}"
          git diff --quiet fnpack.json && echo "fnpack.json 无变更" && exit 0
          git add fnpack.json
          git commit -m "docs: 更新 flymail 版本信息到 fnpack.json"
          git push origin main
