name: 构建 FlyMail

on:
  push:
    tags: ['flymail-v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则读取 manifest 默认版本）'
        required: false
        default: ''
      create_release:
        description: '创建 GitHub Release'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      update_fnpack:
        description: '更新 fnpack.json 版本信息'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  build:
    runs-on: ubuntu-latest
    name: 构建 ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            fnpack_platform: x86
          - arch: arm64
            fnpack_platform: arm
    defaults:
      run:
        working-directory: flymail

    steps:
      # ========== 检出 FnDepot 仓库 ==========
      - name: 检出代码
        uses: actions/checkout@v4

      # ========== 确定版本号 ==========
      - name: 确定版本号
        id: version
        run: |
          MANIFEST_VER=$(grep '^version' manifest | awk -F'=' '{print $2}' | tr -d ' ')
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/flymail-v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#flymail-v}"
          else
            VERSION="${MANIFEST_VER}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本号: $VERSION"

      # ========== 克隆私有仓库源码 ==========
      - name: 克隆源码仓库
        env:
          PRIVATE_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git clone --depth=1 -b main https://x-access-token:${PRIVATE_TOKEN}@github.com/DinDing1/FlyMail.git /tmp/flymail-src
          echo "✅ 源码克隆完成"

      # ========== 构建前端 ==========
      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 构建前端
        run: |
          cd /tmp/flymail-src/frontend
          rm -rf node_modules package-lock.json
          npm install
          npm run build
          echo "✅ 前端构建完成"

      # ========== 编译 Python 后端为二进制 (Nuitka) ==========
      # x86_64/arm64: 均通过 Docker 容器编译，使用 bullseye 确保 GLIBC 兼容性
      - name: 配置 QEMU (ARM 构建)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 编译 Python 后端 (Nuitka)
        run: |
          mkdir -p /tmp/nuitka-out
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "ARM 构建：通过 Docker QEMU 编译..."
            docker run --rm --platform linux/arm64 \
              -v /tmp/flymail-src/backend:/build \
              -v /tmp/nuitka-out:/output \
              python:3.11-slim-bullseye \
              bash -c "
                apt-get update -qq && apt-get install -y -qq patchelf gcc > /dev/null &&
                pip install nuitka cryptography ordered-set --quiet &&
                cd /build &&
                python -m nuitka --standalone --onefile \
                  --include-package=services \
                  --include-package=routes \
                  --include-package=models \
                  --include-module=cryptography \
                  --include-module=sqlite3 \
                  --output-filename=server \
                  --output-dir=/output \
                  main.py &&
                echo '编译完成'
              "
          else
            echo "x86_64 构建：通过 Docker 容器编译（使用 bullseye 确保 GLIBC 兼容性）..."
            docker run --rm \
              -v /tmp/flymail-src/backend:/build \
              -v /tmp/nuitka-out:/output \
              python:3.11-slim-bullseye \
              bash -c "
                apt-get update -qq && apt-get install -y -qq patchelf gcc > /dev/null &&
                pip install nuitka cryptography ordered-set --quiet &&
                cd /build &&
                python -m nuitka --standalone --onefile \
                  --include-package=services \
                  --include-package=routes \
                  --include-package=models \
                  --include-module=cryptography \
                  --include-module=sqlite3 \
                  --output-filename=server \
                  --output-dir=/output \
                  main.py &&
                echo '编译完成'
              "
          fi
          echo "✅ Python 后端编译完成"
          file /tmp/nuitka-out/server 2>/dev/null || true
          ls -lh /tmp/nuitka-out/server

      # ========== 组装应用文件 ==========
      - name: 组装应用文件
        run: |
          # 前端产物 → app/ui/
          mkdir -p app/ui
          cp -r /tmp/flymail-src/dist/ui/* app/ui/

          # Nuitka 编译产物 → app/server/
          mkdir -p app/server
          cp /tmp/nuitka-out/server app/server/server
          chmod +x app/server/server
          echo "✅ 应用文件组装完成"

      # ========== 更新 manifest ==========
      - name: 更新 manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLATFORM="${{ matrix.fnpack_platform }}"
          sed -i "s/^version.*/version=${VERSION}/" manifest
          sed -i "s/^platform.*/platform=${PLATFORM}/" manifest

      # ========== 修复脚本权限 ==========
      - name: 修复脚本权限
        run: |
          for f in cmd/main cmd/install_init cmd/install_callback cmd/uninstall_init cmd/uninstall_callback cmd/upgrade_init cmd/upgrade_callback cmd/config_init cmd/config_callback; do
            [ -f "$f" ] && sed -i 's/\r$//' "$f" && chmod +x "$f"
          done

      # ========== 使用 fnpack 打包 FPK ==========
      - name: 下载 fnpack 并打包
        run: |
          curl -fsSL -o /tmp/fnpack https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64
          chmod +x /tmp/fnpack
          /tmp/fnpack build --directory .
          FPKN=$(ls *.fpk) && mv "$FPKN" flymail-${{ matrix.arch == 'x86_64' && 'X86' || 'ARM' }}.fpk
          echo "✅ 构建完成: $(ls -lh *.fpk)"

      # ========== 上传产物 ==========
      - name: 上传 FPK
        uses: actions/upload-artifact@v4
        with:
          name: flymail-${{ matrix.arch }}
          path: flymail/flymail-*.fpk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/flymail-v') || github.event.inputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有 FPK
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: 删除旧版本 Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName' 2>/dev/null || echo "")
          echo "$RELEASES" | while read -r tag; do
            case "$tag" in flymail-*) gh release delete "${tag}" --yes --cleanup-tag 2>/dev/null || true;; esac
          done

      - name: 确定构建信息
        id: info
        run: |
          MANIFEST_VER=$(grep '^version' flymail/manifest | awk -F'=' '{print $2}' | tr -d ' ')
          if [[ "${{ github.ref }}" == refs/tags/flymail-v* ]]; then
            TAG="${{ github.ref_name }}" && VERSION="${TAG#flymail-v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="flymail-v${{ github.event.inputs.version }}" && VERSION="${{ github.event.inputs.version }}"
          else
            TAG="flymail-v${MANIFEST_VER}" && VERSION="${MANIFEST_VER}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_time=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M CST')" >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: "FlyMail ${{ steps.info.outputs.version }}"
          files: ./artifacts/**/*.fpk
          generate_release_notes: false
          body: |
            ## FlyMail v${{ steps.info.outputs.version }}

            为 FnNAS / 飞牛 OS 打造的邮件客户端应用，支持 Microsoft Outlook 账户。

            ### 📦 下载

            | 文件 | 架构 | 适用设备 |
            |------|------|----------|
            | `flymail-X86.fpk` | x86_64 | Intel/AMD NAS |
            | `flymail-ARM.fpk` | arm64 | ARM NAS |

            ### ✨ 功能特性

            - 📧 Microsoft Outlook 邮件收发
            - 📂 邮件分类与管理
            - 🔍 全局搜索
            - 📎 附件支持

            ---
            构建时间：${{ steps.info.outputs.build_time }}

      - name: 更新 README 编译时间
        run: |
          git fetch origin main
          git checkout -B main origin/main
          python3 scripts/update-readme-time.py flymail "${{ steps.info.outputs.build_time }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "无变更" && exit 0
          git add README.md
          git commit -m "docs: 更新 flymail 编译时间"
          git push origin main

      - name: 更新 fnpack.json 版本信息
        if: github.event.inputs.update_fnpack == 'true'
        run: |
          git fetch origin main
          git checkout -B main origin/main
          python3 scripts/update-fnpack.py flymail "${{ steps.info.outputs.tag }}" "${{ github.repository }}"
          git diff --quiet fnpack.json && echo "fnpack.json 无变更" && exit 0
          git add fnpack.json
          git commit -m "docs: 更新 flymail 版本信息到 fnpack.json"
          git push origin main
