name: 构建 FlyMail

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则自动读取）'
        required: false
        default: ''
      update_fnpack:
        description: '更新 fnpack.json 版本信息'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  trigger-and-download:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - name: 检出 FnDepot 仓库
        uses: actions/checkout@v4

      - name: 触发源码仓库构建
        if: matrix.arch == 'x86_64'  # 只触发一次
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          echo "触发 FlyMail 源码仓库构建..."
          gh workflow run build-flymail-arm-native.yml \
            --repo DinDing1/FlyMail \
            --ref main \
            --field version="${{ github.event.inputs.version }}" \
            --field create_release="false"
          
          echo "等待构建启动..."
          sleep 10

      - name: 等待源码仓库构建完成
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          echo "等待 FlyMail 源码仓库构建完成..."
          
          for i in {1..60}; do
            echo "检查构建状态 ($i/60)..."
            
            # 获取最新的 workflow run
            RUN_ID=$(gh run list \
              --repo DinDing1/FlyMail \
              --workflow build-flymail-arm-native.yml \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
            
            if [ -z "$RUN_ID" ]; then
              echo "未找到构建任务，继续等待..."
              sleep 30
              continue
            fi
            
            STATUS=$(gh run view "$RUN_ID" \
              --repo DinDing1/FlyMail \
              --json status \
              --jq '.status')
            
            echo "构建状态: $STATUS"
            
            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(gh run view "$RUN_ID" \
                --repo DinDing1/FlyMail \
                --json conclusion \
                --jq '.conclusion')
              
              if [ "$CONCLUSION" = "success" ]; then
                echo "✅ 构建成功！Run ID: $RUN_ID"
                echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
                break
              else
                echo "❌ 构建失败: $CONCLUSION"
                exit 1
              fi
            fi
            
            sleep 30
          done
          
          if [ -z "$RUN_ID" ] || [ "$STATUS" != "completed" ]; then
            echo "❌ 构建超时（30分钟）"
            exit 1
          fi

      - name: 下载源码仓库构建产物
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          echo "下载 FlyMail 构建产物..."
          
          gh run download "$RUN_ID" \
            --repo DinDing1/FlyMail \
            --name flymail-${{ matrix.arch }} \
            --dir /tmp/flymail-fpk/
          
          ls -lh /tmp/flymail-fpk/
          
          # 重命名为标准格式
          FPK_FILE=$(ls /tmp/flymail-fpk/*.fpk | head -1)
          if [ -n "$FPK_FILE" ]; then
            cp "$FPK_FILE" flymail-${{ matrix.arch }}.fpk
            echo "✅ 已下载: flymail-${{ matrix.arch }}.fpk"
          else
            echo "❌ 未找到 .fpk 文件"
            exit 1
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: flymail-${{ matrix.arch }}-fpk
          path: flymail-*.fpk
          retention-days: 7

  update-fnpack-json:
    needs: trigger-and-download
    runs-on: ubuntu-latest
    if: github.event.inputs.update_fnpack == 'true'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: 更新 fnpack.json
        run: |
          # 读取版本号
          VERSION=$(unzip -p artifacts/flymail-x86_64-fpk/flymail-x86_64.fpk manifest | grep '^version' | awk -F'=' '{print $2}' | tr -d ' ')
          
          if [ -z "$VERSION" ]; then
            echo "❌ 无法读取版本号"
            exit 1
          fi
          
          echo "更新 fnpack.json 版本: $VERSION"
          
          # 更新 fnpack.json（假设格式为标准 JSON）
          jq --arg ver "$VERSION" \
            '.version = $ver | .updated = (now | strftime("%Y-%m-%d"))' \
            flymail/fnpack.json > /tmp/fnpack.json.new
          
          mv /tmp/fnpack.json.new flymail/fnpack.json
          
          # 提交更新
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flymail/fnpack.json
          git commit -m "chore(flymail): 更新版本到 $VERSION" || echo "无需更新"
          git push
